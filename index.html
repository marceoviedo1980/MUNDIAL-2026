<style>
/* ======================== VARIABLES ======================== */
:root {
  --bg:        #f1f5f9;
  --hdr-bg:    #0f172a;
  --hdr-text:  #ffffff;
  --accent:    #facc15;

  /* Kevin = Azul */
  --k-pri:   #1d4ed8;
  --k-mid:   #3b82f6;
  --k-lite:  #dbeafe;
  --k-btn:   #1e40af;
  --k-text:  #1e3a8a;

  /* Tommy = Rojo */
  --t-pri:   #b91c1c;
  --t-mid:   #ef4444;
  --t-lite:  #fee2e2;
  --t-btn:   #991b1b;
  --t-text:  #7f1d1d;

  --user-pri:  var(--k-pri);
  --user-mid:  var(--k-mid);
  --user-lite: var(--k-lite);
  --user-btn:  var(--k-btn);
  --user-text: var(--k-text);
}
body.tommy {
  --user-pri:  var(--t-pri);
  --user-mid:  var(--t-mid);
  --user-lite: var(--t-lite);
  --user-btn:  var(--t-btn);
  --user-text: var(--t-text);
}

/* ======================== RESET ======================== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);min-height:100vh;
     padding-bottom:60px;transition:background .3s}
body.kevin{background:linear-gradient(180deg,#dbeafe 0px,#f1f5f9 140px)}
body.tommy{background:linear-gradient(180deg,#fee2e2 0px,#f1f5f9 140px)}

/* ======================== HEADER ======================== */
.hdr{background:var(--user-pri);color:#fff;position:sticky;top:0;z-index:50;
     box-shadow:0 4px 24px rgba(0,0,0,.35);transition:background .3s}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:900;
           letter-spacing:.12em;text-align:center;padding:.4rem .5rem .2rem;
           border-bottom:1px solid rgba(255,255,255,.15);text-transform:uppercase}
.hdr-sub{font-size:.6rem;opacity:.7;letter-spacing:.08em;font-weight:400;margin-left:.5rem}

/* USER TABS */
.user-tabs{display:flex;padding:.4rem .75rem .35rem;gap:.5rem;justify-content:center}
.user-btn{flex:0 0 130px;padding:.4rem 1rem;border-radius:999px;border:none;
          font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;
          letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;
          display:flex;align-items:center;justify-content:center;gap:.35rem}
#btn-kevin{background:var(--k-btn);color:#fff;border:2px solid transparent}
#btn-tommy{background:var(--t-btn);color:#fff;border:2px solid transparent}
#btn-kevin.active{background:#fff;color:var(--k-text);border-color:var(--k-mid);
                  transform:scale(1.06);box-shadow:0 2px 12px rgba(29,78,216,.35)}
#btn-tommy.active{background:#fff;color:var(--t-text);border-color:var(--t-mid);
                  transform:scale(1.06);box-shadow:0 2px 12px rgba(185,28,28,.35)}
.user-dot{width:9px;height:9px;border-radius:50%}
#btn-kevin .user-dot{background:var(--k-mid)}
#btn-tommy .user-dot{background:var(--t-mid)}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);padding:.2rem .5rem .5rem}
.stat{text-align:center}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;line-height:1}
.stat-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.65)}

/* SYNC STATUS */
.sync-bar{text-align:center;font-size:.6rem;padding:.15rem;
          background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);letter-spacing:.05em}
.sync-bar.error{background:rgba(239,68,68,.3);color:#fca5a5}
.sync-bar.ok{background:rgba(34,197,94,.2);color:#86efac}

/* ======================== VIEW TABS ======================== */
.view-tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;
           position:sticky;top:152px;z-index:40;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.view-tab{flex:1;padding:.45rem;border:none;background:none;
          font-family:'DM Sans',sans-serif;font-weight:700;font-size:.72rem;
          cursor:pointer;color:#64748b;transition:all .15s;letter-spacing:.02em}
.view-tab.active{background:var(--user-pri);color:#fff}

/* ======================== SEARCH ======================== */
.search-row{display:flex;gap:.4rem;padding:.4rem .6rem;background:#fff;
            border-bottom:1px solid #e2e8f0;position:sticky;top:196px;z-index:39}
.search-input{flex:1;border:2px solid #e2e8f0;border-radius:.75rem;padding:.3rem .65rem;
              font-size:.8rem;background:#f8fafc;outline:none;font-family:'DM Sans',sans-serif;
              transition:border-color .15s}
.search-input:focus{border-color:var(--user-mid)}
.clear-btn{border:none;background:none;cursor:pointer;color:#94a3b8;font-size:1rem;padding:0 .2rem}

/* ======================== FILTER BAR ======================== */
.filter-bar{display:flex;gap:.3rem;padding:.35rem .5rem;background:#fff;
            border-bottom:1px solid #e2e8f0;overflow-x:auto;-webkit-overflow-scrolling:touch;
            position:sticky;top:238px;z-index:37;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:.2rem .65rem;border-radius:999px;border:2px solid #e2e8f0;
      font-weight:700;font-size:.7rem;cursor:pointer;background:#f8fafc;color:#64748b;
      transition:all .12s;white-space:nowrap}
.fbtn.active{border-color:var(--user-pri);background:var(--user-pri);color:#fff}
.fbtn.f-miss.active{border-color:#64748b;background:#64748b;color:#fff}
.fbtn.f-have.active{border-color:#22c55e;background:#22c55e;color:#fff}
.fbtn.f-dup.active{border-color:#f97316;background:#f97316;color:#fff}

/* ======================== PILLS (ajuste sticky top) ======================== */
.pills-wrap{background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto;
            -webkit-overflow-scrolling:touch;position:sticky;top:274px;z-index:36;
            scrollbar-width:none}
.pills-wrap::-webkit-scrollbar{display:none}
.pills{display:flex;gap:.3rem;padding:.4rem;width:max-content}
.pill{padding:.18rem .55rem;border-radius:.5rem;border:2px solid transparent;
      font-weight:700;font-size:.72rem;cursor:pointer;white-space:nowrap;
      transition:all .12s;background:#f1f5f9;color:#475569}
.pill.active{background:var(--user-pri);color:#fff;border-color:var(--user-pri)}
.pill:not(.active):hover{border-color:var(--user-mid)}
.pct{font-weight:700;margin-left:.2rem;font-size:.65rem}

/* ======================== GRID CONTENT ======================== */
.content{padding:.6rem .4rem;display:flex;flex-direction:column;gap:.9rem}
.sec-block{}
.sec-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem;padding:.3rem .4rem;
            background:#fff;border-radius:.75rem;border-left:4px solid var(--sec-color,#94a3b8)}
.sec-dot{width:9px;height:9px;border-radius:50%;background:var(--sec-color,#94a3b8);flex-shrink:0}
.sec-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.95rem;
          color:#1e293b;flex:1}
.sec-prog{display:flex;align-items:center;gap:.35rem}
.prog-bar{width:48px;height:5px;background:#e2e8f0;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:var(--user-mid);border-radius:999px;transition:width .4s}
.sec-cnt{font-size:.68rem;font-weight:700;color:#94a3b8}

/* STICKER CARDS */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem}
.card{border:2.5px solid #e2e8f0;background:#fff;border-radius:.875rem;
      padding:.4rem .2rem .35rem;display:flex;flex-direction:column;align-items:center;
      cursor:pointer;transition:transform .08s,border-color .12s,background .12s;
      min-height:70px;user-select:none;-webkit-user-select:none;position:relative}
.card:active{transform:scale(.88)}
.card.have{border-color:var(--user-mid);background:var(--user-lite)}
.card.dup{border-color:#f97316;background:#fff7ed}
.card-code{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.72rem;
           line-height:1.1;text-align:center;color:#334155}
.card.have .card-code{color:var(--user-text)}
.card.dup .card-code{color:#c2410c}
.card-name{font-size:.62rem;color:#1e293b;text-align:center;overflow:hidden;
           text-overflow:ellipsis;white-space:nowrap;width:100%;line-height:1.2;margin-top:.1rem;
           padding:0 .15rem;font-weight:500}
.card-ico{margin-top:auto;padding-top:.2rem;font-size:.85rem;line-height:1}
.ico-m{color:#cbd5e1;font-size:.7rem}
.ico-h{color:var(--user-mid);font-weight:900}
.ico-d{color:#f97316;font-weight:900;font-size:.65rem}

/* SAVING indicator on card */
.card.saving{opacity:.6}
.card.saving::after{content:'⟳';position:absolute;top:2px;right:4px;font-size:.6rem;color:#94a3b8;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ======================== TRADE VIEW ======================== */
.trade-wrap{padding:.75rem .5rem}
.trade-subtitle{font-size:.68rem;font-weight:700;text-transform:uppercase;
                letter-spacing:.08em;color:#94a3b8;margin-bottom:.6rem;padding:.4rem .5rem;
                background:#fff;border-radius:.75rem;border-left:4px solid var(--user-mid)}
.trade-subtitle b{color:var(--user-text)}
.trade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}
.trade-card{border:2px solid #fed7aa;background:#fff7ed;border-radius:.875rem;
            padding:.4rem;text-align:center}
.trade-code{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.82rem;color:#c2410c}
.trade-name{font-size:.6rem;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ======================== EMPTY STATES ======================== */
.empty{text-align:center;padding:3rem 1rem;color:#cbd5e1}
.empty-ico{font-size:3rem;margin-bottom:.75rem}
.empty-msg{font-weight:700;font-size:.95rem;color:#94a3b8}
.empty-sub{font-size:.78rem;color:#cbd5e1;margin-top:.35rem}

/* ======================== BOTTOM BAR ======================== */
.legend{position:fixed;bottom:0;left:0;right:0;background:var(--user-pri);
        color:#fff;display:flex;justify-content:center;gap:1.25rem;padding:.45rem;
        z-index:60;transition:background .3s;font-size:.68rem}
.leg{display:flex;align-items:center;gap:.3rem}

/* ======================== LOADING ======================== */
.loader{position:fixed;inset:0;background:var(--user-pri);display:flex;
        flex-direction:column;align-items:center;justify-content:center;
        z-index:999;transition:opacity .4s}
.loader.hidden{opacity:0;pointer-events:none}
.loader-ball{font-size:4rem;animation:bounce .6s infinite alternate}
.loader-text{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;
             color:#fff;letter-spacing:.15em;margin-top:1rem}
.loader-sub{font-size:.8rem;color:rgba(255,255,255,.7);margin-top:.4rem}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-20px)}}

/* ======================== TOAST ======================== */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(20px);
       background:#1e293b;color:#fff;padding:.5rem 1.2rem;border-radius:999px;
       font-size:.78rem;font-weight:700;opacity:0;transition:all .25s;z-index:70;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

const TOTAL = CATALOG.reduce((a,s)=>a+s.stickers.length,0);

// =============================================
// STATE
// =============================================
let curUser = 'kevin';
let curView = 'album';
let curSec  = 'all';
let curFilter = 'all';   // 'all' | 'miss' | 'have' | 'dup'
// coleccion[user][sticker_id] = cantidad (1 o 2+)
let coleccion = { kevin:{}, tommy:{} };
let supaLoaded = false;
let pendingOps = {};  // sticker_id -> timeout (debounce)

// =============================================
// SUPABASE FETCH HELPER
// =============================================
async function supaFetch(path, opts={}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    ...opts
  });
  if (!res.ok && res.status !== 404) {
    const txt = await res.text();
    throw new Error(`${res.status}: ${txt}`);
  }
  if (res.status === 204 || res.headers.get('content-length')==='0') return null;
  return res.json().catch(()=>null);
}

// =============================================
// LOAD FROM SUPABASE
// =============================================
async function loadFromSupabase() {
  setSyncBar('🔄 Cargando colección...', '');
  try {
    const rows = await supaFetch('coleccion?select=usuario,sticker_id,cantidad');
    coleccion = { kevin:{}, tommy:{} };
    if (rows) {
      rows.forEach(r => {
        if (coleccion[r.usuario]) coleccion[r.usuario][r.sticker_id] = r.cantidad;
      });
    }
    supaLoaded = true;
    setSyncBar('✅ Sincronizado con la nube', 'ok');
    setTimeout(()=>setSyncBar('☁️ En línea','ok'), 2500);
  } catch(e) {
    setSyncBar('⚠️ Sin conexión — modo local', 'error');
    // fallback localStorage
    try {
      const saved = localStorage.getItem('mundial2026');
      if (saved) coleccion = JSON.parse(saved);
    } catch(_){}
  }
}

// =============================================
// SAVE TO SUPABASE (debounced)
// =============================================
function saveSticker(id, cantidad) {
  // Guardar localmente de inmediato
  try { localStorage.setItem('mundial2026', JSON.stringify(coleccion)); } catch(_){}

  if (pendingOps[id]) clearTimeout(pendingOps[id]);
  pendingOps[id] = setTimeout(async () => {
    delete pendingOps[id];
    try {
      if (cantidad === 0) {
        await supaFetch(`coleccion?usuario=eq.${curUser}&sticker_id=eq.${encodeURIComponent(id)}`, {
          method:'DELETE', prefer:'return=minimal'
        });
      } else {
        await supaFetch('coleccion', {
          method:'POST',
          prefer:'resolution=merge-duplicates,return=minimal',
          body: JSON.stringify({ usuario:curUser, sticker_id:id, cantidad })
        });
      }
      setSyncBar('✅ Guardado en la nube','ok');
      setTimeout(()=>setSyncBar('☁️ En línea','ok'),1500);
    } catch(e) {
      setSyncBar('⚠️ Error al guardar — se reintentará','error');
    }
  }, 600);
}

// =============================================
// TOGGLE STICKER
// =============================================
function toggle(id) {
  const cur = coleccion[curUser][id] || 0;
  const next = cur >= 9 ? 0 : cur + 1;
  if (next === 0) delete coleccion[curUser][id];
  else coleccion[curUser][id] = next;
  saveSticker(id, next);
  renderStats();
  renderCards(id);
}

// =============================================
// UI HELPERS
// =============================================
function setSyncBar(msg, cls='') {
  const el = document.getElementById('sync-bar');
  el.textContent = msg;
  el.className = 'sync-bar' + (cls ? ' '+cls : '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function setUser(u) {
  curUser = u;
  curFilter = 'all';
  ['all','miss','have','dup'].forEach(k => {
    document.getElementById('fb-'+k).classList.toggle('active', k==='all');
  });
  document.body.className = u;
  document.getElementById('btn-kevin').classList.toggle('active', u==='kevin');
  document.getElementById('btn-tommy').classList.toggle('active', u==='tommy');
  showToast(u==='kevin' ? '🔵 Modo Kevin activado' : '🔴 Modo Tommy activado');
  render();
}

function setFilter(f) {
  curFilter = f;
  ['all','miss','have','dup'].forEach(k => {
    document.getElementById('fb-'+k).classList.toggle('active', k===f);
  });
  render();
}

function setView(v) {
  curView = v;
  document.getElementById('vt-album').classList.toggle('active', v==='album');
  document.getElementById('vt-trade').classList.toggle('active', v==='trade');
  document.getElementById('srow').style.display  = v==='album' ? 'flex'  : 'none';
  document.getElementById('fbar').style.display  = v==='album' ? 'flex'  : 'none';
  document.getElementById('pwrap').style.display = v==='album' ? 'block' : 'none';
  render();
}

function setSec(c) { curSec = c; render(); }

// =============================================
// STATS
// =============================================
function getStats() {
  const vals = Object.values(coleccion[curUser]);
  return { have: vals.length, dup: vals.filter(v=>v>=2).length };
}

function renderStats() {
  const st = getStats();
  document.getElementById('s-have').textContent = st.have;
  document.getElementById('s-miss').textContent = TOTAL - st.have;
  document.getElementById('s-dup').textContent  = st.dup;
  document.getElementById('s-pct').textContent  = Math.round(st.have/TOTAL*100) + '%';
  const trades = getTrades();
  document.getElementById('tc').textContent = trades.length;
}

function getTrades() {
  const other = curUser==='kevin' ? 'tommy' : 'kevin';
  return CATALOG.flatMap(s => s.stickers
    .filter(st => {
      const id = `${s.code}-${st.num}`;
      return (coleccion[curUser][id]||0) >= 2 && !coleccion[other][id];
    })
    .map(st => ({...st, sc:s.code, sn:s.name}))
  );
}

// =============================================
// CARD STATE (update single card without full re-render)
// =============================================
function renderCards(id) {
  const el = document.getElementById('card-'+id);
  if (!el) return;
  const v = coleccion[curUser][id] || 0;
  el.className = 'card' + (v===1?' have':v>=2?' dup':'');
  el.querySelector('.card-ico').innerHTML = cardIco(id);
}

function cardIco(id) {
  const v = coleccion[curUser][id] || 0;
  if (v===0) return '<span class="ico-m">●</span>';
  if (v===1) return '<span class="ico-h">✓</span>';
  return `<span class="ico-d">×${v}</span>`;
}

function cardCls(id) {
  const v = coleccion[curUser][id] || 0;
  return v===0 ? '' : v===1 ? 'have' : 'dup';
}

// =============================================
// MAIN RENDER
// =============================================
function getVisible() {
  const q = (document.getElementById('search')?.value||'').toLowerCase();

  // Función de filtro por estado
  const stateOk = (id) => {
    const v = coleccion[curUser][id] || 0;
    if (curFilter === 'miss')  return v === 0;
    if (curFilter === 'have')  return v === 1;
    if (curFilter === 'dup')   return v >= 2;
    return true; // 'all'
  };

  if (curSec !== 'all') {
    const s = CATALOG.find(x=>x.code===curSec);
    if (!s) return [];
    const st = s.stickers.filter(x => {
      const id = `${s.code}-${x.num}`;
      return stateOk(id) && (!q || `${s.code} ${x.num} ${x.name}`.toLowerCase().includes(q));
    });
    return [{...s, stickers:st}];
  }
  return CATALOG.map(s=>({...s, stickers:s.stickers.filter(st=>{
    const id = `${s.code}-${st.num}`;
    return stateOk(id) && (!q || `${s.code} ${st.num} ${st.name} ${s.name}`.toLowerCase().includes(q));
  })})).filter(s=>s.stickers.length);
}

function render() {
  renderStats();

  // Pills
  document.getElementById('pills').innerHTML =
    `<button class="pill${curSec==='all'?' active':''}" onclick="setSec('all')">Todos</button>` +
    CATALOG.map(s => {
      const n = s.stickers.filter(st=>coleccion[curUser][`${s.code}-${st.num}`]).length;
      const pct = Math.round(n/s.stickers.length*100);
      return `<button class="pill${curSec===s.code?' active':''}" onclick="setSec('${s.code}')">`+
        `${s.code}${pct>0?`<span class="pct">${pct}%</span>`:''}</button>`;
    }).join('');

  const main = document.getElementById('main');

  // TRADE VIEW
  if (curView === 'trade') {
    const trades = getTrades();
    const other = curUser==='kevin' ? 'Tommy' : 'Kevin';
    if (!trades.length) {
      main.innerHTML = `<div class="empty"><div class="empty-ico">🤝</div>
        <div class="empty-msg">Sin intercambios disponibles</div>
        <div class="empty-sub">Marca figuras como ×2 para ver<br>qué le puedes ofrecer a ${other}</div></div>`;
    } else {
      main.innerHTML = `<div class="trade-wrap">
        <div class="trade-subtitle">Duplicadas de <b>${curUser==='kevin'?'Kevin':'Tommy'}</b> que le faltan a <b>${other}</b> — ${trades.length} figura${trades.length!==1?'s':''}</div>
        <div class="trade-grid">${trades.map(t=>`
          <div class="trade-card">
            <div class="trade-code">${t.sc} ${t.num}</div>
            <div class="trade-name">${t.name||'—'}</div>
          </div>`).join('')}
        </div></div>`;
    }
    return;
  }

  // ALBUM VIEW
  const visible = getVisible();
  if (!visible.length) {
    main.innerHTML = `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-msg">Sin resultados</div></div>`;
    return;
  }

  main.innerHTML = `<div class="content">${visible.map(s => {
    const sHave = s.stickers.filter(st=>coleccion[curUser][`${s.code}-${st.num}`]).length;
    const pct   = Math.round(sHave/s.stickers.length*100);
    return `<div class="sec-block">
      <div class="sec-header" style="--sec-color:${s.color}">
        <div class="sec-dot"></div>
        <div class="sec-name">${s.name}</div>
        <div class="sec-prog">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="sec-cnt">${sHave}/${s.stickers.length}</div>
        </div>
      </div>
      <div class="grid">${s.stickers.map(st => {
        const id = `${s.code}-${st.num}`;
        return `<button class="card ${cardCls(id)}" id="card-${id}" onclick="toggle('${id}')">
          <div class="card-code">${s.code}&nbsp;${st.num}</div>
          ${st.name?`<div class="card-name">${st.name}</div>`:''}
          <div class="card-ico">${cardIco(id)}</div>
        </button>`;
      }).join('')}</div>
    </div>`;
  }).join('')}</div>`;
}

// =============================================
// INIT
// =============================================
async function init() {
  // PWA service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  document.getElementById('loader-sub').textContent = 'Conectando con Supabase...';
  await loadFromSupabase();

  document.getElementById('loader-sub').textContent = 'Listo!';
  render();

  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    setTimeout(()=>document.getElementById('loader').remove(),500);
  }, 800);
}

init();
</script>
</body>
</html>
